{% extends 'main.html' %}

{% block content %}

<h1>Edit Post</h1>

<form method="POST" action="">
    {% csrf_token %}
    <input type="text" name="content" value="{{clean_content}}" >
    <input type="hidden" name="next" value="{{next}}"/>
    <button type="submit">Update Post</button>
    <a href="{{request.META.HTTP_REFERER}}"><p>GO BACK</p></a>
</form>

{% endblock %}
