{% extends 'main.html' %}

{% block content %}

<h1>Your friends</h1>

<form method="POST">
    {% csrf_token %}
{% for f in friend_list %}
<label>
    {% load cloudinary %}

    {% cloudinary f.pfp quality='auto' width=100 height=100 crop='fill' %}   
    <input type="checkbox" name="members" value="{{f.id}}">
    {{f.username}}
</label>
<hr>
{% endfor %}

 <button type="submit">Add</button>

</form>
<a href="{% url 'group_chat' group.id %}"><h3>Return</h3></a>

{% endblock %}
