{% extends 'main.html' %}

{% block content %}

<h1>Change your pfp</h1>

{% if messages %}
    <ul class="messages">
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
        </ul>
    {% endif %}

<form method="POST" action="" enctype="multipart/form-data">
    {% csrf_token %}
    <p><input type="file" name="filename"  accept="image"></p>
    <button type="submit">Update</button>
</form>
<p><a href="{{request.META.HTTP_REFERER}}">Return</a></p>

{% endblock %}
