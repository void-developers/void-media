<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='sign-log-mobile.css') }}"
    />
    <title>Void Media</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>𖣐</text></svg>"
    />
  </head>

  <body>
    <!-- Floating particles -->
    <canvas id="particles"></canvas>

    <!-- Page Wrapper -->
    <div class="page-wrap">
      <!-- Logo -->
      <div class="logo">𖣐<span>Void</span>Media</div>

      <!-- Auth Card -->
      <div class="auth-card">
        <!-- Tabs -->
        <div class="tabs">
          <button class="tab-btn active" data-tab="login">Log In</button>
          <button class="tab-btn" data-tab="signup">Sign Up</button>
        </div>

        <!-- LOGIN PANEL -->
        <div class="tab-panel active" id="tab-login">
          <div class="panel">
            <div class="panel-title">Welcome back</div>
            <div class="panel-sub">Sign in to your Void Media account</div>

            <div class="social-row">
              <!-- Flask: replace href with {{ url_for('google_login') }} -->
              <a href="#" class="social-btn">
                <i class="fa-brands fa-google"></i>
                <span>Google</span>
              </a>
              <a href="#" class="social-btn">
                <i class="fa-brands fa-github"></i>
                <span>GitHub</span>
              </a>
            </div>

            <div class="divider">or continue with username</div>

            <div class="field">
              <label for="name">Username</label>
              <input
                type="text"
                id="name"
                placeholder="username"
                autocomplete="username"
              />
            </div>
            <div class="field">
              <label for="password">Password</label>
              <div class="input-wrap">
                <input
                  type="password"
                  id="password"
                  placeholder="••••••••"
                  autocomplete="current-password"
                />
                <button
                  class="toggle-pw"
                  data-target="password"
                  type="button"
                  aria-label="Toggle password"
                >
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
            </div>

            <button class="btn-primary" id="loginbtn" type="button">
              Log In
            </button>
          </div>

          <div class="card-footer">
            No account?
            <a class="switch-tab" data-tab="signup">Create one</a>
          </div>
        </div>

        <!-- SIGNUP PANEL -->
        <div class="tab-panel" id="tab-signup">
          <div class="panel">
            <div class="panel-title">Join the void</div>
            <div class="panel-sub">Create your Void Media account</div>

            <div class="social-row">
              <!-- Flask: replace href with {{ url_for('google_login') }} -->
              <a href="#" class="social-btn">
                <i class="fa-brands fa-google"></i>
                <span>Google</span>
              </a>
              <a href="#" class="social-btn">
                <i class="fa-brands fa-github"></i>
                <span>GitHub</span>
              </a>
            </div>

            <div class="divider">or register with username</div>

            <div class="field">
              <label for="addname">Username</label>
              <input
                type="text"
                id="addname"
                placeholder="username"
                autocomplete="username"
              />
            </div>
            <div class="field">
              <label for="addpassword">Password</label>
              <div class="input-wrap">
                <input
                  type="password"
                  id="addpassword"
                  placeholder="••••••••"
                  autocomplete="new-password"
                />
                <button
                  class="toggle-pw"
                  data-target="addpassword"
                  type="button"
                  aria-label="Toggle password"
                >
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
            </div>

            <button class="btn-primary" id="signupbtn" type="button">
              Create Account
            </button>
          </div>

          <div class="card-footer">
            Already have an account?
            <a class="switch-tab" data-tab="login">Log in</a>
          </div>
        </div>
      </div>
      <!-- /auth-card -->

      <div class="credit">©Void-Developer</div>
    </div>
    <!-- /page-wrap -->

    <script src="{{ url_for('static', filename='sign-log-mobile.js') }}"></script>
  </body>
</html>
