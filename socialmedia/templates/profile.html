<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='profile.css') }}"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>𖣐</text></svg>"
    />

    
    <link  rel="stylesheet" href="profile.css">
    <title>Profile Page</title>
  </head>

  <body>
   <header class="header">
  <div class="header-inner">

    <div class="logo" onclick="window.location.href = '/showposts'">
      <span class="logo-icon">𖣐</span>
      <span class="logo-text">Void<span class="logo-accent">Media</span></span>
    </div>

    <nav class="nav">
      <a href="{{url_for('home')}}" class="nav-link nav-logout">Logout</a>
    </nav>

  </div>
</header>

      <div class="card">
        <div class="profile-top">
          <img
            src="{{user.imgpath}}"
            alt="Profile picture"
          />
          <h3 class="profile-name">{{user.name}}</h3>
        </div>

        <h4 class="desc-label">Description</h4>
        <input type="text" id="desc" value="{{user.description}}" />
        <button id="saveDescBtn">Save</button>
      </div>

      <div class="card">
        <details>
          <summary>⚙ Settings</summary>
          <ul>
            <li><a href="{{ url_for('editnamepage') }}">Edit Name</a></li>
            <li><a href="{{ url_for('editimgpage') }}">Edit Profile Image</a></li>
          </ul>
        </details>
      </div>
    </div>

    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
  </body>
</html>
