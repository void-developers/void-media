<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='sign-log.css') }}"
    />
    <title>void media login page</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>𖣐</text></svg>"
    />
  </head>

  <body>
    <!-- Ambient floating orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Floating particles -->
    <canvas id="particles"></canvas>

    <div class="container" id="container">
      <div class="form-container sign-up">
        <form>
          <h1>Create Account</h1>
          <div class="social-icons">
            <a href="{{ url_for('google_login') }}"
              ><i class="fa-brands fa-brands fa-google"></i
            ></a>
            <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
          </div>
          <input type="user name " placeholder="user-name" id="addname" />
          <input type="password" placeholder="Password" id="addpassword" />
          <button id="signupbtn" type="button">Sign Up</button>
        </form>
      </div>
      <div class="form-container sign-in">
        <form>
          <h1>Log In</h1>
          <div class="social-icons">
            <a href="{{ url_for('google_login') }}" class="icon"
              ><i class="fa-brands fa-google"></i
            ></a>
            <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
          </div>
          <input type="text" placeholder="user-name" id="name" />
          <input type="password" placeholder="Password" id="password" />
          <button id="loginbtn" type="button">Log In</button>
        </form>
      </div>
      <div class="toggle-container">
        <div class="toggle">
          <div class="toggle-panel toggle-left">
            <h1>Void Media</h1>
            <p>Go to LOG IN page <--------</p>
            <button class="hidden" id="login" type="button">Log In</button>
          </div>
          <div class="toggle-panel toggle-right">
            <h1>Void Media</h1>
            <p>--------> Go to SIGN UP page</p>
            <button class="hidden" id="register" type="button">Sign Up</button>
          </div>
        </div>
      </div>
    </div>
    <div class="team-name">©Void-Develper</div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
    <script>
      // ── Floating particles ───────────────────────────────
      const canvas = document.getElementById("particles");
      const ctx = canvas.getContext("2d");
      let W,
        H,
        pts = [];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      for (let i = 0; i < 70; i++)
        pts.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.4 + 0.2,
          vx: (Math.random() - 0.5) * 0.25,
          vy: (Math.random() - 0.5) * 0.25,
          a: Math.random() * 0.35 + 0.05,
        });

      (function draw() {
        ctx.clearRect(0, 0, W, H);
        pts.forEach((p) => {
          p.x = (p.x + p.vx + W) % W;
          p.y = (p.y + p.vy + H) % H;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(123,92,255,${p.a})`;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      })();
    </script>
  </body>
</html>
